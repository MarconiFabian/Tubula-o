<!DOCTYPE html>
<html lang="en">

    <title>Isometrico Manager - Software desenvolvido por Marconi Fabian</title>

  <body>
    <div id="root">
      <div style="background: #020617; color: #94a3b8; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif;">
